name: Lighthouse - Desktop & Mobile

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 자정 UTC
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse (Desktop)
        run: lhci autorun --config=lighthouserc.js

      - name: Run Lighthouse (Mobile)
        run: lhci autorun --config=lighthouserc_mobile.js

      - name: List desktop result files
        run: ls -al results/desktop || echo "❌ desktop 폴더 없음"

      - name: List mobile result files
        run: ls -al results/mobile || echo "❌ mobile 폴더 없음"

      - name: Upload Reports (Desktop)
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-desktop-reports
          path: results/desktop/*.*

      - name: Upload Reports (Mobile)
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-mobile-reports
          path: results/mobile/*.*

      - name: Install Node dependencies
        run: npm install cheerio || true

      - name: Extract scores from JSON reports
        run: node extract-scores.js
        
      - name: Show Lighthouse score summary
        run: node extract-scores.js
