name: Lighthouse - Desktop & Mobile

on:
  schedule:
    - cron: "0 16 * * 0,3" # KST 월/목 01:00 (UTC 일/수 16:00)
  workflow_dispatch:

concurrency:
  group: lighthouse-monitoring
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # device(desktop/mobile) × scope(domestic/global) = 4 jobs 병렬.
  # domestic 의 runner 를 나중에 self-hosted(Seoul) 로 바꾸면 국내 사이트만 한국 환경에서 측정됨.
  lighthouse:
    name: lighthouse (${{ matrix.device }}/${{ matrix.scope }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { device: desktop, scope: domestic, runner: ubuntu-latest }
          - { device: desktop, scope: global,   runner: ubuntu-latest }
          - { device: mobile,  scope: domestic, runner: ubuntu-latest }
          - { device: mobile,  scope: global,   runner: ubuntu-latest }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse (${{ matrix.device }} / ${{ matrix.scope }})
        env:
          LH_SCOPE: ${{ matrix.scope }}
        run: |
          if [ "${{ matrix.device }}" = "desktop" ]; then
            lhci autorun --config=lighthouserc.js
          else
            lhci autorun --config=lighthouserc_mobile.js
          fi

      # scope 별 결과를 같은 results/<device> 로 merge 할 때 manifest.json 이 충돌하므로 제거.
      # extract-scores.js 는 manifest 가 없으면 개별 LHR json 을 파싱 (동일 결과).
      - name: Remove manifest (avoid cross-scope collision)
        run: rm -f results/${{ matrix.device }}/manifest.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: lh-${{ matrix.device }}-${{ matrix.scope }}
          path: results/${{ matrix.device }}/*.*
          if-no-files-found: warn

  summarize_and_notify:
    runs-on: ubuntu-latest
    needs: [lighthouse]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node dependencies (if any)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json. Skipping npm install."
          fi

      # matrix 의 4 artifact 를 device 별로 merge (domestic + global 합침).
      - name: Download Desktop Results (merge scopes)
        uses: actions/download-artifact@v4
        with:
          pattern: lh-desktop-*
          path: results/desktop
          merge-multiple: true

      - name: Download Mobile Results (merge scopes)
        uses: actions/download-artifact@v4
        with:
          pattern: lh-mobile-*
          path: results/mobile
          merge-multiple: true

      - name: List result files (pre-parse)
        run: |
          echo "=== results/desktop ==="
          ls -al results/desktop || true
          echo "=== results/mobile ==="
          ls -al results/mobile || true

      - name: Extract scores + build summary
        run: node extract-scores.js
        
      - name: Save + Commit history snapshot
        run: |
          TS=$(date -u +'%Y-%m-%d-%H%M%S')
          mkdir -p history

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull --rebase

          cp results/summary.json history/$TS.json

          git add history/$TS.json
          git commit -m "chore: lighthouse snapshot $TS" || echo "No changes"
          git push

      - name: Build 3-month comparison table (all URLs)
        run: node build-3m-table.js

      - name: Publish comparison table to Job Summary
        run: |
          cat results/compare-3m-all.md >> $GITHUB_STEP_SUMMARY

      - name: Build Week-over-Week comparison table
        run: node build-3m-table.js
        env:
          PAST_DAYS: "7"
          OUT_MD: "results/compare-wow.md"
          OUT_CSV: "results/compare-wow.csv"
          COMPARE_TITLE: "Week-over-Week Comparison (All URLs)"
          COMPARE_LABEL: "Past (~7d ago, latest-per-day)"

      - name: Publish Week-over-Week comparison to Job Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          cat results/compare-wow.md >> $GITHUB_STEP_SUMMARY

      - name: Build WoW regressions (perf Δ ≤ -5)
        run: node build-regressions.js

      - name: Publish regressions to Job Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          cat results/regressions-wow.md >> $GITHUB_STEP_SUMMARY

      - name: Generate 3M AI analysis
        run: node generate-3m-ai-analysis.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          OPENAI_MAX_OUTPUT_TOKENS: "2500"

      - name: Publish 3M AI analysis to Job Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 3-Month AI Insights" >> $GITHUB_STEP_SUMMARY
          if [ -f results/compare-3m-ai.md ]; then
            cat results/compare-3m-ai.md >> $GITHUB_STEP_SUMMARY
          else
            echo "_(No 3-month AI analysis yet. File not generated.)_" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload comparison & regression artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-compare
          path: |
            results/compare-3m-all.md
            results/compare-3m-all.csv
            results/compare-3m-ai.md
            results/compare-wow.md
            results/compare-wow.csv
            results/regressions-wow.md
          if-no-files-found: warn

      - name: Build AI input (optional)
        run: |
          if [ -f generate-ai-input.js ]; then
            node generate-ai-input.js
          else
            echo "No generate-ai-input.js. Skipping."
          fi

      # 적용 액션 효과를 코드로 검증 → applied-eval.json/md. generate-ai-suggestions 앞에 두어
      # AI 가 검증 결과를 fact 로 받도록 함. history commit 이 이미 끝나 이번 회차도 after 윈도 포함.
      - name: Evaluate applied actions (deterministic)
        run: node evaluate-applied-actions.js

      - name: Publish applied-action evaluation to Job Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/applied-eval.md ]; then
            cat results/applied-eval.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate AI suggestions (OpenAI)
        run: node generate-ai-suggestions.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          OPENAI_MAX_OUTPUT_TOKENS: "6000"

      - name: Publish AI suggestions to Job Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## AI Suggestions (per-site + per-URL)" >> $GITHUB_STEP_SUMMARY
          if [ -f results/ai-suggestions.md ]; then
            cat results/ai-suggestions.md >> $GITHUB_STEP_SUMMARY
          else
            echo "_(No AI suggestions generated.)_" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build Slack payload
        run: node build-slack-payload.js
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Decide Slack notify
        id: decide
        run: |
          STATUS=$(node -e "const s=require('./results/summary.json'); console.log((s?.overall?.status)||'UNKNOWN')")
          echo "status=$STATUS"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "OK" ]; then
            echo "should_notify=true" >> $GITHUB_OUTPUT
          else
            echo "should_notify=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack message (bot/thread → fallback webhook)
        if: steps.decide.outputs.should_notify == 'true'
        run: |
          echo "Sending Slack message (status=${{ steps.decide.outputs.status }})"
          node send-slack.js
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # 노션 sync — secret 두 개 다 등록돼 있을 때만 시도. 실패해도 워크플로 실패로 잡지 않음
      # (Slack/측정/history 커밋은 이미 끝난 후라 노션 일시 장애로 전체 fail 처리할 가치 ↓).
      - name: Sync to Notion (best-effort)
        if: env.NOTION_TOKEN != '' && env.NOTION_PARENT_PAGE_ID != ''
        continue-on-error: true
        run: node sync-notion.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTION_CURRENT_DB_ID: ${{ secrets.NOTION_CURRENT_DB_ID }}

      - name: Upload Summary + AI + Slack payload
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-summary-and-slack
          path: |
            results/summary.json
            results/ai-input.json
            results/ai-suggestions.md
            results/slack-payload.json
            results/applied-eval.md
            results/applied-eval.json
          if-no-files-found: warn
