name: Lighthouse - Desktop & Mobile

on:
  schedule:
    - cron: "0 16 * * 0,3" # KST 월/목 01:00 (UTC 일/수 16:00)
  workflow_dispatch:

concurrency:
  group: lighthouse-monitoring
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lighthouse_desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse (Desktop)
        run: lhci autorun --config=lighthouserc.js

      - name: Upload Desktop Results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-desktop-results
          path: results/desktop/*.*
          if-no-files-found: warn

  lighthouse_mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse (Mobile)
        run: lhci autorun --config=lighthouserc_mobile.js

      - name: Upload Mobile Results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-mobile-results
          path: results/mobile/*.*
          if-no-files-found: warn

  summarize_and_notify:
    runs-on: ubuntu-latest
    needs: [lighthouse_desktop, lighthouse_mobile]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node dependencies (if any)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json. Skipping npm install."
          fi

      - name: Download Desktop Results
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-desktop-results
          path: results/desktop

      - name: Download Mobile Results
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-mobile-results
          path: results/mobile

      - name: List result files (pre-parse)
        run: |
          echo "=== results/desktop ==="
          ls -al results/desktop || true
          echo "=== results/mobile ==="
          ls -al results/mobile || true

      - name: Extract scores + build summary
        run: node extract-scores.js

      - name: Save history snapshot
        run: |
          mkdir -p history
          DATE=$(date +'%Y-%m-%d')
          cp results/summary.json history/$DATE.json

      - name: Commit history snapshot
        run: |
          DATE=$(date +'%Y-%m-%d')
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase
          git add history/$DATE.json
          git commit -m "chore: lighthouse snapshot $DATE" || echo "No changes"
          git push

      # ✅ 여기서부터: 3개월 비교표/분석은 Slack에 넣지 않고, GitHub Job Summary에서만 확인
      - name: Build 3-month comparison table (all URLs)
        run: node build-3m-table.js

      - name: Publish comparison table to Job Summary
        run: |
          cat results/compare-3m-all.md >> $GITHUB_STEP_SUMMARY

      # ✅ 3개월 비교 데이터 기반 AI 코멘트 생성/게시 (GitHub Summary 전용)
      - name: Generate 3M AI analysis
        run: node generate-3m-ai-analysis.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          OPENAI_MAX_OUTPUT_TOKENS: "500"

      - name: Publish 3M AI analysis to Job Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 3-Month AI Insights" >> $GITHUB_STEP_SUMMARY
          if [ -f results/compare-3m-ai.md ]; then
            cat results/compare-3m-ai.md >> $GITHUB_STEP_SUMMARY
          else
            echo "_(No 3-month AI analysis yet. File not generated.)_" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload 3-month comparison table files
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-3m-compare
          path: |
            results/compare-3m-all.md
            results/compare-3m-all.csv
            results/compare-3m-ai.md
          if-no-files-found: warn

      # 기존 Slack 알림 흐름은 그대로 유지
      - name: Build AI input (optional)
        run: |
          if [ -f generate-ai-input.js ]; then
            node generate-ai-input.js
          else
            echo "No generate-ai-input.js. Skipping."
          fi

      - name: Generate AI suggestions (OpenAI)
        run: node generate-ai-suggestions.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          OPENAI_MAX_OUTPUT_TOKENS: "650"

      - name: Build Slack payload
        run: node build-slack-payload.js

      - name: Decide Slack notify
        id: decide
        run: |
          STATUS=$(node -e "const s=require('./results/summary.json'); console.log((s?.overall?.status)||'UNKNOWN')")
          echo "status=$STATUS"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "OK" ]; then
            echo "should_notify=true" >> $GITHUB_OUTPUT
          else
            echo "should_notify=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack message (webhook)
        if: steps.decide.outputs.should_notify == 'true'
        run: |
          echo "Sending Slack message (status=${{ steps.decide.outputs.status }})"
          curl -X POST -H 'Content-type: application/json' \
            --data @results/slack-payload.json \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Upload Summary + AI + Slack payload
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-summary-and-slack
          path: |
            results/summary.json
            results/ai-input.json
            results/ai-suggestions.md
            results/slack-payload.json
          if-no-files-found: warn
